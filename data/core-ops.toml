  { name = "a", type = "simd.i32x4" },
  { name = "b", type = "simd.i32x4" },
]
outputs = [{ type = "simd.i32x4" }]
generic_params = []
constraints = []
[operations.semantics]
const_evaluable = true
overflow = "wrap"
nan = "none"
trap = "none"
[operations.effect]
memory = "none"
allocates = false
may_trap = false
noreturn = false
external_io = false
nondeterminism = "deterministic"
atomic = false
volatile = false
[operations.inline]
policy = "hint"
[operations.lowering]
kind = "normal_call"
[[operations.specializations]]
when = { portable_simd_lowering = "NativeSimd" }
backend = "wasm"
target_op = "i32x4.sub"
[operations.fallback]
implementation_symbol = "example.invalid.fallback.simd_i32x4_sub"
required = true

[[operations]]
id = "simd.f32x4.add"
exposure = "public"
binding_required = false
description = "Portable 4-lane f32 addition. Scalar fallback, native SIMD specialisation."
[operations.signature]
inputs = [
  { name = "a", type = "simd.f32x4" },
  { name = "b", type = "simd.f32x4" },
]
outputs = [{ type = "simd.f32x4" }]
generic_params = []
constraints = []
[operations.semantics]
const_evaluable = true
overflow = "ieee754"
nan = "canonical"
trap = "none"
[operations.effect]
memory = "none"
allocates = false
may_trap = false
noreturn = false
external_io = false
nondeterminism = "deterministic"
atomic = false
volatile = false
[operations.inline]
policy = "hint"
[operations.lowering]
kind = "normal_call"
[[operations.specializations]]
when = { portable_simd_lowering = "NativeSimd" }
backend = "wasm"
