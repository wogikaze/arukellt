# Core semantic operations registry — ADR-042 (ACCEPTED) D5
# Human-readable overview: docs/compiler/core-ops-registry.md
#
# Canonical semantic operation registry. Compiler consumption is in progress (#798).
#
# Fallback values are stable implementation symbol paths (or DefKey after name
# resolution). Do not store compile-local FunctionId here.

schema_version = 4
status = "scaffold"

[registry]
description = "Core semantic operations registry"
canonical_path = "data/core-ops.toml"
planned_outputs = [
  "compiler-type-table",
  "compiler-semantic-ops",
  "stdlib-manifest-validation",
  "docs-semantic-table",
]

[validation]
# Validation invariant declarations. These are not on/off toggles; the checker
# always runs them and requires the keys to match the expected set.

[validation.python]
check_unreferenced_required_bindings = true
check_public_binding_collisions = true
check_signature_compat = true
check_effect_lowering_consistency = true
check_binding_field_consistency = true
check_forbidden_bindings = true
check_fallback_resolvable = true
check_specialization_ambiguity = true

[validation.compiler]
check_fallback_no_cycle = true
check_fallback_signature_compat = true

# ─────────────────────────────────────────────────────────────────────────────
# Types
# ─────────────────────────────────────────────────────────────────────────────
# These are referenced from std/manifest.toml via type_id.

[[types]]
id = "string"
kind = "string"

[[types]]
id = "vec"
kind = "vec"
generic_params = ["T"]

[[types]]
id = "simd.i32x4"
kind = "simd"
lane_type = "i32"
lanes = 4

[[types]]
id = "simd.f32x4"
kind = "simd"
lane_type = "f32"
lanes = 4

[[types]]
id = "simd.mask4"
kind = "mask"
lanes = 4

[[types]]
id = "wasm.v128"
kind = "wasm_v128"

# ─────────────────────────────────────────────────────────────────────────────
# Operations
# ─────────────────────────────────────────────────────────────────────────────
# id is the canonical CoreOpId. std/manifest.toml references it via core_op_id.
# Example fallback values that do not yet resolve to a real implementation symbol
# are prefixed with example.invalid so a future checker can reject them mechanically.
#
# visibility: public / internal
# classification.layer: primitive / runtime / semantic_stdlib / target_raw
# binding.policy: required / optional / forbidden
#
# A public binding with policy = required must be referenced from std/manifest.toml.
# policy = optional must include binding.reason (and a tracking issue or RFC reference
# when the binding is intentionally deferred).

[[operations]]
id = "string.starts_with"
visibility = "public"
classification = { layer = "semantic_stdlib" }
binding = { policy = "required" }
description = "Return true when the receiver string starts with the given prefix."
[operations.signature]
inputs = [
  { name = "s", type = { kind = "ref", name = "string" } },
  { name = "prefix", type = { kind = "ref", name = "string" } },
]
receiver_index = 0
outputs = [{ type = { kind = "primitive", name = "bool" } }]
generic_params = []
constraints = []
[operations.semantics]
const_evaluable = true
overflow = "none"
nan = "none"
trap = "none"
equivalence = "exact_bool"
[operations.effect]
memory = "read"
allocates = false
may_trap = false
noreturn = false
external_io = false
nondeterminism = "deterministic"
atomic = false
volatile = false
[operations.inline]
policy = "hint"
[operations.lowering]
kind = "normal_call"
[operations.fallback]
implementation_symbol = "example.invalid.fallback.string.starts_with_impl"
required = true

