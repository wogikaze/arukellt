[[operations]]
id = "wasm.v128.load"
exposure = "public"
binding_required = true
description = "Load a 128-bit vector from linear memory at address + offset."
[operations.signature]
inputs = [
  { name = "address", type = "i32" },
  { name = "offset", type = "i32" },
]
outputs = [{ type = "v128" }]
generic_params = []
constraints = []
[operations.semantics]
const_evaluable = false
overflow = "none"
nan = "none"
trap = "memory"
[operations.effect]
memory = "read"
allocates = false
may_trap = true
noreturn = false
external_io = false
nondeterminism = "deterministic"
atomic = false
volatile = false
[operations.inline]
policy = "hint"
[operations.lowering]
kind = "target_intrinsic"
[operations.lowering.target]
target_family = "wasm"
target_id = "v128.load"
required_features = ["simd"]
[operations.fallback]
required = false
