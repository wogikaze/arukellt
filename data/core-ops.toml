# Core semantic operations registry scaffold — ADR-042 (PROPOSED) D5
# Human-readable overview: docs/compiler/core-ops-registry.md
#
# Proposed responsibility split; not authoritative until ADR-042 is accepted and
# issue #798 completes the migration.
#
# Fallback values are stable implementation symbol paths (or DefKey after name
# resolution). Do not store compile-local FunctionId here.

schema_version = 3
status = "scaffold"

[registry]
description = "Core semantic operations registry"
canonical_path = "data/core-ops.toml"
planned_outputs = [
  "compiler-type-table",
  "compiler-semantic-ops",
  "stdlib-manifest-validation",
  "docs-semantic-table",
]

[validation]
# Conditions a generator/checker must satisfy before the registry can lose
# status = "scaffold".
check_unreferenced_public_bindings = true
check_public_binding_collisions = true
check_signature_compat = true
check_effect_lowering_consistency = true
check_fallback_resolvable = true

# ─────────────────────────────────────────────────────────────────────────────
# Types
# ─────────────────────────────────────────────────────────────────────────────
# These are referenced from std/manifest.toml via type_id.

[[types]]
id = "string"
kind = "string"

[[types]]
id = "vec"
kind = "vec"
generic_params = ["T"]

[[types]]
id = "simd.i32x4"
kind = "simd"
lane_type = "i32"
lanes = 4

[[types]]
id = "simd.f32x4"
kind = "simd"
lane_type = "f32"
lanes = 4

[[types]]
id = "simd.mask4"
kind = "mask"
lanes = 4

# ─────────────────────────────────────────────────────────────────────────────
# Operations
# ─────────────────────────────────────────────────────────────────────────────
# id is the canonical CoreOpId. std/manifest.toml references it via core_op_id.
# Example fallback values that do not yet resolve to a real implementation symbol
# are prefixed with example.invalid so a future checker can reject them mechanically.

[[operations]]
id = "string.starts_with"
exposure = "public"
binding_required = true
description = "Return true when the receiver string starts with the given prefix."
[operations.signature]
inputs = [
  { name = "s", type = "string" },
  { name = "prefix", type = "string" },
]
receiver_index = 0
outputs = [{ type = "bool" }]
generic_params = []
constraints = []
[operations.semantics]
const_evaluable = true
overflow = "none"
nan = "none"
trap = "none"
[operations.effect]
memory = "read"
allocates = false
may_trap = false
noreturn = false
external_io = false
nondeterminism = "deterministic"
atomic = false
volatile = false
[operations.inline]
policy = "hint"
[operations.lowering]
kind = "normal_call"
[operations.fallback]
implementation_symbol = "example.invalid.fallback.string.starts_with_impl"
required = true

[[operations]]
id = "panic"
exposure = "public"
binding_required = true
description = "Abort execution with a message, via the runtime panic handler."
[operations.signature]
inputs = [{ name = "message", type = "string" }]
outputs = [{ type = "unit" }]
generic_params = []
constraints = []
[operations.semantics]
const_evaluable = false
overflow = "none"
nan = "none"
trap = "none"
[operations.effect]
memory = "none"
allocates = false
may_trap = false
noreturn = true
external_io = true
nondeterminism = "deterministic"
atomic = false
volatile = false
[operations.inline]
policy = "never"
[operations.lowering]
kind = "runtime_call"
[operations.lowering.runtime]
function = "panic"
abi = "native"
[operations.fallback]
required = false

[[operations]]
id = "simd.i32x4.add"
exposure = "public"
binding_required = false
description = "Portable 4-lane i32 addition. Scalar fallback, native SIMD specialisation."
[operations.signature]
inputs = [
  { name = "a", type = "simd.i32x4" },
  { name = "b", type = "simd.i32x4" },
]
outputs = [{ type = "simd.i32x4" }]
generic_params = []
constraints = []
[operations.semantics]
const_evaluable = true
overflow = "wrap"
nan = "none"
trap = "none"
[operations.effect]
memory = "none"
allocates = false
may_trap = false
noreturn = false
external_io = false
nondeterminism = "deterministic"
atomic = false
volatile = false
[operations.inline]
policy = "hint"
[operations.lowering]
kind = "normal_call"
[[operations.specializations]]
when = { portable_simd_lowering = "NativeSimd" }
backend = "wasm"
target_op = "i32x4.add"
[operations.fallback]
implementation_symbol = "example.invalid.fallback.simd_i32x4_add"
required = true

