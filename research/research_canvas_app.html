<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Canvas App</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffaf1;
      --line: #d6c7b2;
      --ink: #1f2328;
      --muted: #6f675e;
      --accent: #0f766e;
      --sticky: #fff3cc;
      --sticky-border: #d7be7a;
      --group: #efe5d4;
      --group-border: #bba889;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #fff7e2 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, #e7f3f0 0%, transparent 45%),
        var(--bg);
    }
    .shell {
      height: 100vh;
      padding: 10px;
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 10px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(56, 45, 31, 0.08);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .head {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .title { font-weight: 700; font-size: 15px; margin-right: auto; }
    .meta { color: var(--muted); font-size: 12px; }
    .btn {
      border: 1px solid #b8d6d2;
      background: #e6f6f3;
      color: #14544e;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .canvas-wrap {
      position: relative;
      overflow: hidden;
      flex: 1;
      min-height: 0;
      background: #f3eee4;
      border-radius: 0 0 12px 12px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    canvas.dragging { cursor: grabbing; }
    .hint {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 11px;
      color: var(--muted);
    }
    .status {
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px dashed var(--line);
    }
    @media (max-width: 1100px) {
      .shell { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <div class="head">
        <div class="title">Index: research.pen</div>
        <div class="meta" id="indexMeta">loading...</div>
        <button class="btn" id="indexFit">Fit</button>
        <button class="btn" id="indexZoomIn">+</button>
        <button class="btn" id="indexZoomOut">-</button>
      </div>
      <div class="canvas-wrap" id="indexWrap">
        <canvas id="indexCanvas"></canvas>
        <div class="hint">ホイール: 拡大縮小 / ドラッグ: 移動 / カードクリック: detail表示</div>
      </div>
      <div class="status" id="indexStatus">カードをクリックすると右に対応 detail を表示します。</div>
    </section>

    <section class="panel">
      <div class="head">
        <div class="title">Detail</div>
        <div class="meta" id="detailMeta">未選択</div>
        <button class="btn" id="detailFit">Fit</button>
        <button class="btn" id="detailZoomIn">+</button>
        <button class="btn" id="detailZoomOut">-</button>
      </div>
      <div class="canvas-wrap" id="detailWrap">
        <canvas id="detailCanvas"></canvas>
      </div>
      <div class="status" id="detailStatus">左のL1カードを選択してください。</div>
    </section>
  </div>

  <script>
    const indexMeta = document.getElementById('indexMeta');
    const detailMeta = document.getElementById('detailMeta');
    const indexStatus = document.getElementById('indexStatus');
    const detailStatus = document.getElementById('detailStatus');

    const frameIsNameplate = (name) => String(name || '').startsWith('Nameplate::');

    function frameText(frame) {
      const kids = Array.isArray(frame?.children) ? frame.children : [];
      for (const k of kids) {
        if (k && typeof k === 'object' && Object.prototype.hasOwnProperty.call(k, 'content')) {
          return String(k.content || '').replace(/\n/g, ' ').trim();
        }
      }
      return String(frame?.name || '').trim();
    }

    function parsePathGeometry(geom) {
      const text = String(geom || '').trim();
      if (!text) return [];
      const tokens = text.split(/\s+/);
      const pts = [];
      let i = 0;
      while (i < tokens.length) {
        const cmd = tokens[i++];
        if (cmd !== 'M' && cmd !== 'L') continue;
        const x = Number(tokens[i++]);
        const y = Number(tokens[i++]);
        if (Number.isFinite(x) && Number.isFinite(y)) pts.push({ x, y });
      }
      return pts;
    }

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

    class PenCanvasViewer {
      constructor({ canvas, wrap, onFrameClick }) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.wrap = wrap;
        this.onFrameClick = onFrameClick;
        this.pen = null;
        this.frames = [];
        this.rects = [];
        this.paths = [];
        this.texts = [];
        this.bounds = { minx: 0, miny: 0, maxx: 1200, maxy: 800 };
        this.view = { scale: 0.2, tx: 0, ty: 0 };
        this.drag = null;
        this.hoverId = null;
        this.devicePixelRatio = window.devicePixelRatio || 1;
        this._bind();
        this.resize();
      }

      setPen(pen) {
        this.pen = pen;
        const children = Array.isArray(pen?.children) ? pen.children : [];
        this.frames = children.filter(c => c.type === 'frame');
        this.rects = children.filter(c => c.type === 'rectangle');
        this.paths = children.filter(c => c.type === 'path');
        this.texts = children.filter(c => c.type === 'text');
        this._computeBounds();
        this.fit();
      }

      _computeBounds() {
        let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
        const put = (x, y, w = 0, h = 0) => {
          minx = Math.min(minx, x);
          miny = Math.min(miny, y);
          maxx = Math.max(maxx, x + w);
          maxy = Math.max(maxy, y + h);
        };

        for (const r of this.rects) put(+r.x || 0, +r.y || 0, +r.width || 0, +r.height || 0);
        for (const f of this.frames) put(+f.x || 0, +f.y || 0, +f.width || 260, +f.height || 120);
        for (const t of this.texts) put(+t.x || 0, +t.y || 0, 220, 40);
        for (const p of this.paths) put(+p.x || 0, +p.y || 0, +p.width || 0, +p.height || 0);

        if (!Number.isFinite(minx)) {
          minx = 0; miny = 0; maxx = 1200; maxy = 800;
        }
        this.bounds = { minx, miny, maxx, maxy };
      }

      fit() {
        const w = this.wrap.clientWidth;
        const h = this.wrap.clientHeight;
        const bw = this.bounds.maxx - this.bounds.minx + 120;
        const bh = this.bounds.maxy - this.bounds.miny + 120;
        this.view.scale = clamp(Math.min(w / bw, h / bh), 0.03, 3);
        const cx = (this.bounds.minx + this.bounds.maxx) / 2;
        const cy = (this.bounds.miny + this.bounds.maxy) / 2;
        this.view.tx = w / 2 - cx * this.view.scale;
        this.view.ty = h / 2 - cy * this.view.scale;
        this.render();
      }

      zoomBy(factor, cx, cy) {
        const prev = this.view.scale;
        const next = clamp(prev * factor, 0.02, 8);
        const wx = (cx - this.view.tx) / prev;
        const wy = (cy - this.view.ty) / prev;
        this.view.scale = next;
        this.view.tx = cx - wx * next;
        this.view.ty = cy - wy * next;
        this.render();
      }

      resize() {
        const w = this.wrap.clientWidth;
        const h = this.wrap.clientHeight;
        this.canvas.width = Math.floor(w * this.devicePixelRatio);
        this.canvas.height = Math.floor(h * this.devicePixelRatio);
        this.canvas.style.width = w + 'px';
        this.canvas.style.height = h + 'px';
        this.ctx.setTransform(this.devicePixelRatio, 0, 0, this.devicePixelRatio, 0, 0);
        this.render();
      }

      worldPoint(clientX, clientY) {
        const rect = this.canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        return {
          x: (x - this.view.tx) / this.view.scale,
          y: (y - this.view.ty) / this.view.scale,
          sx: x,
          sy: y,
        };
      }

      hitFrame(wx, wy) {
        for (let i = this.frames.length - 1; i >= 0; i--) {
          const f = this.frames[i];
          const x = +f.x || 0;
          const y = +f.y || 0;
          const w = +f.width || 260;
          const h = +f.height || 120;
          if (wx >= x && wx <= x + w && wy >= y && wy <= y + h) return f;
        }
        return null;
      }

      _bind() {
        this.canvas.addEventListener('wheel', (e) => {
          e.preventDefault();
          const delta = e.deltaY < 0 ? 1.1 : 0.9;
          const rect = this.canvas.getBoundingClientRect();
          this.zoomBy(delta, e.clientX - rect.left, e.clientY - rect.top);
        }, { passive: false });

        this.canvas.addEventListener('mousedown', (e) => {
          const p = this.worldPoint(e.clientX, e.clientY);
          this.drag = { x: p.sx, y: p.sy, tx: this.view.tx, ty: this.view.ty, moved: false };
          this.canvas.classList.add('dragging');
        });

        window.addEventListener('mousemove', (e) => {
          if (!this.drag) {
            const p = this.worldPoint(e.clientX, e.clientY);
            const hit = this.hitFrame(p.x, p.y);
            const id = hit?.id || null;
            if (id !== this.hoverId) {
              this.hoverId = id;
              this.render();
            }
            return;
          }
          const p = this.worldPoint(e.clientX, e.clientY);
          const dx = p.sx - this.drag.x;
          const dy = p.sy - this.drag.y;
          if (Math.abs(dx) + Math.abs(dy) > 3) this.drag.moved = true;
          this.view.tx = this.drag.tx + dx;
          this.view.ty = this.drag.ty + dy;
          this.render();
        });

        window.addEventListener('mouseup', (e) => {
          if (!this.drag) return;
          const d = this.drag;
          this.drag = null;
          this.canvas.classList.remove('dragging');
          if (d.moved) return;

          const p = this.worldPoint(e.clientX, e.clientY);
          const hit = this.hitFrame(p.x, p.y);
          if (hit && this.onFrameClick) this.onFrameClick(hit);
        });

        window.addEventListener('resize', () => this.resize());
      }

      _drawArrowHead(ax, ay, bx, by) {
        const ctx = this.ctx;
        const ang = Math.atan2(by - ay, bx - ax);
        const len = 10;
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(bx - len * Math.cos(ang - Math.PI / 7), by - len * Math.sin(ang - Math.PI / 7));
        ctx.lineTo(bx - len * Math.cos(ang + Math.PI / 7), by - len * Math.sin(ang + Math.PI / 7));
        ctx.closePath();
        ctx.fillStyle = '#477491';
        ctx.fill();
      }

      _drawWrapped(text, x, y, maxW, lineH, maxLines) {
        const ctx = this.ctx;
        const chars = String(text || '').split('');
        const lines = [];
        let cur = '';
        for (const ch of chars) {
          const t = cur + ch;
          if (ctx.measureText(t).width > maxW && cur) {
            lines.push(cur);
            cur = ch;
          } else {
            cur = t;
          }
          if (lines.length >= maxLines) break;
        }
        if (lines.length < maxLines && cur) lines.push(cur);
        if (lines.length > maxLines) lines.length = maxLines;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, y + i * lineH);
      }

      render() {
        const ctx = this.ctx;
        const w = this.wrap.clientWidth;
        const h = this.wrap.clientHeight;
        ctx.clearRect(0, 0, w, h);

        if (!this.pen) return;

        ctx.save();
        ctx.setTransform(
          this.view.scale * this.devicePixelRatio,
          0,
          0,
          this.view.scale * this.devicePixelRatio,
          this.view.tx * this.devicePixelRatio,
          this.view.ty * this.devicePixelRatio
        );

        // Group rectangles
        for (const r of this.rects) {
          const x = +r.x || 0;
          const y = +r.y || 0;
          const rw = +r.width || 0;
          const rh = +r.height || 0;
          const rad = +r.cornerRadius || 8;
          ctx.fillStyle = 'rgba(239,229,212,0.6)';
          ctx.strokeStyle = '#b9a88a';
          ctx.lineWidth = 1.2;
          this._roundedRect(ctx, x, y, rw, rh, rad);
          ctx.fill();
          ctx.stroke();
          const nm = String(r.name || '').replace(/^Island::/, '');
          ctx.fillStyle = '#5b5348';
          ctx.font = '600 12px "Noto Sans JP"';
          ctx.fillText(nm, x + 10, y + 18);
        }

        // Paths/arrows
        for (const p of this.paths) {
          const pts = parsePathGeometry(p.geometry);
          if (pts.length < 2) continue;
          ctx.strokeStyle = '#477491';
          ctx.lineWidth = (+p?.stroke?.thickness || 1.6);
          ctx.beginPath();
          ctx.moveTo((+p.x || 0) + pts[0].x, (+p.y || 0) + pts[0].y);
          for (let i = 1; i < pts.length; i++) {
            ctx.lineTo((+p.x || 0) + pts[i].x, (+p.y || 0) + pts[i].y);
          }
          ctx.stroke();
          const a = pts[pts.length - 2];
          const b = pts[pts.length - 1];
          this._drawArrowHead((+p.x || 0) + a.x, (+p.y || 0) + a.y, (+p.x || 0) + b.x, (+p.y || 0) + b.y);
        }

        // Text blocks
        for (const t of this.texts) {
          ctx.fillStyle = '#2b2b2b';
          const fs = +t.fontSize || 22;
          const fw = +t.fontWeight >= 600 ? '700' : '500';
          ctx.font = `${fw} ${fs}px "Noto Sans JP"`;
          ctx.fillText(String(t.content || ''), +t.x || 0, (+t.y || 0) + fs);
        }

        // Sticky frames and nameplates
        for (const f of this.frames) {
          const x = +f.x || 0;
          const y = +f.y || 0;
          const fw = +f.width || 260;
          const fh = +f.height || (frameIsNameplate(f.name) ? 80 : 120);
          const isPlate = frameIsNameplate(f.name);
          const isHover = this.hoverId && this.hoverId === f.id;
          const fill = isPlate ? '#c6eaf9' : '#fff3cc';
          const stroke = isPlate ? '#6bb5d4' : '#d1b471';
          this._roundedRect(ctx, x, y, fw, fh, 8);
          ctx.fillStyle = fill;
          ctx.fill();
          ctx.lineWidth = isHover ? 2.6 : 1.2;
          ctx.strokeStyle = isHover ? '#0f766e' : stroke;
          ctx.stroke();

          const text = this._frameText(f);
          ctx.fillStyle = '#1f2328';
          ctx.font = isPlate ? '600 11px "Noto Sans JP"' : '500 11px "Noto Sans JP"';
          this._drawWrapped(text, x + 8, y + 18, fw - 14, 14, Math.floor((fh - 12) / 14));

          if (!isPlate) {
            ctx.fillStyle = '#7d7568';
            ctx.font = '10px monospace';
            ctx.fillText(String(f.id || ''), x + 4, y - 3);
          }
        }

        ctx.restore();
      }

      _roundedRect(ctx, x, y, w, h, r) {
        const rr = Math.max(0, Math.min(r, Math.min(w, h) / 2));
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.lineTo(x + w - rr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
        ctx.lineTo(x + w, y + h - rr);
        ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
        ctx.lineTo(x + rr, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
        ctx.lineTo(x, y + rr);
        ctx.quadraticCurveTo(x, y, x + rr, y);
        ctx.closePath();
      }

      _frameText(frame) {
        const kids = Array.isArray(frame.children) ? frame.children : [];
        for (const k of kids) {
          if (k && typeof k === 'object' && Object.prototype.hasOwnProperty.call(k, 'content')) {
            return String(k.content || '').replace(/\n/g, ' ');
          }
        }
        return String(frame.name || '');
      }
    }

    function l1FromFrameName(name) {
      const m = String(name || '').match(/^L1-(\d+)::/);
      if (!m) return null;
      return Number(m[1]);
    }

    function normalizeTitle(s) {
      return String(s || '')
        .replace(/^\[L1\]\s*/i, '')
        .replace(/\s+/g, '')
        .toLowerCase();
    }

    function l1FromNameplate(frame, detailList) {
      const text = frameText(frame).replace(/^\[L1\]\s*/i, '').trim();
      const n = normalizeTitle(text);
      if (!n) return null;

      let best = null;
      for (const d of detailList) {
        const dn = normalizeTitle(d?.title || '');
        if (!dn) continue;
        if (dn === n || dn.includes(n) || n.includes(dn)) {
          const score = Math.min(dn.length, n.length);
          if (!best || score > best.score) best = { l1: Number(d.l1), score };
        }
      }
      return best ? best.l1 : null;
    }

    function isRelationPath(node) {
      if (!node || typeof node !== 'object') return false;
      if (node.type !== 'path') return false;
      if (node.name === 'RelationLine') return true;
      return typeof node.id === 'string' && /^rel_/i.test(node.id) && /_line$/i.test(node.id);
    }

    function normalizeRelationLinesInPen(pen) {
      const list = Array.isArray(pen?.children) ? pen.children : [];
      for (const node of list) {
        if (!isRelationPath(node)) continue;
        if (!node.stroke || typeof node.stroke !== 'object') node.stroke = {};
        node.stroke.thickness = 2;
        node.stroke.strokeAlignment = 'outside';
        node.strokeAlignment = 'outside';
      }
      return pen;
    }

    async function boot() {
      const [indexRes, detailIndexRes] = await Promise.all([
        fetch(`research.pen?v=${Date.now()}`, { cache: 'no-store' }),
        fetch(`detail_index.json?v=${Date.now()}`, { cache: 'no-store' }),
      ]);
      const indexPen = normalizeRelationLinesInPen(await indexRes.json());
      const detailIndex = await detailIndexRes.json();

      const detailMap = new Map((detailIndex.details || []).map(d => [Number(d.l1), d]));
      const detailList = Array.isArray(detailIndex.details) ? detailIndex.details : [];

      // Hide sticky cards on index view. Keep only structural elements + L1 nameplates.
      const indexPenLite = {
        ...indexPen,
        children: (Array.isArray(indexPen.children) ? indexPen.children : []).filter((c) => {
          if (c.type !== 'frame') return true;
          return frameIsNameplate(c.name);
        }),
      };

      const indexViewer = new PenCanvasViewer({
        canvas: document.getElementById('indexCanvas'),
        wrap: document.getElementById('indexWrap'),
        onFrameClick: async (frame) => {
          let l1 = l1FromFrameName(frame.name);
          if (l1 === null && frameIsNameplate(frame.name)) {
            l1 = l1FromNameplate(frame, detailList);
          }
          if (l1 === null) {
            indexStatus.textContent = `L1番号を解釈できません: ${frame.name || frame.id}`;
            return;
          }
          const d = detailMap.get(l1);
          if (!d) {
            indexStatus.textContent = `L1-${l1} の detail が見つかりません`;
            return;
          }
          indexStatus.textContent = `L1-${l1} を選択: ${d.file}`;
          await loadDetail(d.file, d.title, l1);
        },
      });

      const detailViewer = new PenCanvasViewer({
        canvas: document.getElementById('detailCanvas'),
        wrap: document.getElementById('detailWrap'),
        onFrameClick: () => {},
      });

      async function loadDetail(file, title, l1) {
        detailMeta.textContent = `L1-${l1} ${title}`;
        detailStatus.textContent = `loading ${file} ...`;
        const res = await fetch(`${file}?v=${Date.now()}`, { cache: 'no-store' });
        const pen = normalizeRelationLinesInPen(await res.json());
        detailViewer.setPen(pen);
        detailStatus.textContent = `${file} / cards: ${pen.children.filter(c => c.type === 'frame' && !frameIsNameplate(c.name)).length}`;
      }

      window.__app = {
        async loadDetailByL1(l1) {
          const d = detailMap.get(Number(l1));
          if (!d) return false;
          await loadDetail(d.file, d.title, Number(l1));
          return true;
        },
        getStatus() {
          return {
            indexMeta: indexMeta.textContent,
            indexStatus: indexStatus.textContent,
            detailMeta: detailMeta.textContent,
            detailStatus: detailStatus.textContent,
          };
        }
      };

      document.getElementById('indexFit').onclick = () => indexViewer.fit();
      document.getElementById('indexZoomIn').onclick = () => indexViewer.zoomBy(1.2, indexViewer.wrap.clientWidth / 2, indexViewer.wrap.clientHeight / 2);
      document.getElementById('indexZoomOut').onclick = () => indexViewer.zoomBy(0.85, indexViewer.wrap.clientWidth / 2, indexViewer.wrap.clientHeight / 2);
      document.getElementById('detailFit').onclick = () => detailViewer.fit();
      document.getElementById('detailZoomIn').onclick = () => detailViewer.zoomBy(1.2, detailViewer.wrap.clientWidth / 2, detailViewer.wrap.clientHeight / 2);
      document.getElementById('detailZoomOut').onclick = () => detailViewer.zoomBy(0.85, detailViewer.wrap.clientWidth / 2, detailViewer.wrap.clientHeight / 2);

      indexViewer.setPen(indexPenLite);
      indexMeta.textContent = `nameplates: ${indexPenLite.children.filter(c => c.type === 'frame').length} / arrows: ${indexPenLite.children.filter(c => c.type === 'path').length}`;

      // default: first detail
      const first = [...detailMap.keys()].sort((a, b) => a - b)[0];
      if (first !== undefined) {
        const d = detailMap.get(first);
        loadDetail(d.file, d.title, first);
      }
    }

    boot().catch((err) => {
      indexMeta.textContent = 'error';
      indexStatus.textContent = String(err);
      detailStatus.textContent = String(err);
    });
  </script>
</body>
</html>
