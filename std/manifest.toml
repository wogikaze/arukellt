# ── Conversion: from string (parsing) ────────

[[functions]]
name = "parse_i32"
kind = "prelude_wrapper"
intrinsic = "__intrinsic_parse_i32"
params = ["String"]
returns = "Result<i32, String>"
prelude = true
stability = "stable"
doc_category = "conversion"
doc = "Parse a decimal string as an i32 integer. Returns Ok(n) on success, or Err with a description on failure."
errors = "Returns Err if the string is not a valid decimal integer or is out of i32 range."
availability = { t1 = true, t3 = true }
examples = [{code = "match parse_i32(\"42\") { Ok(n) => println(i32_to_string(n)), Err(e) => eprintln(e) }", description = "Parse a numeric string", output = "42"}]

