# kind:
#   "builtin"          — direct builtin, no prelude.ark wrapper
#   "intrinsic"        — __intrinsic_* name only (no public wrapper)
#   "prelude_wrapper"  — public fn in prelude.ark that calls an __intrinsic_*
#
# For prelude_wrapper entries, `intrinsic` names the backing __intrinsic_*.
# params/returns use Arukellt type syntax.

