# Arukellt Standard Library Manifest
# Single source of truth for all builtins, intrinsics, and prelude functions.
#
# Sources cross-referenced:
#   - crates/ark-resolve/src/resolve.rs   (PRELUDE_FUNCTIONS, PRELUDE_TYPES, PRELUDE_VALUES)
#   - crates/ark-typecheck/src/checker.rs (register_builtins — FnSig registrations)
#   - std/prelude.ark                     (wrapper functions)
#   - crates/ark-wasm/src/emit/t1_wasm32_p1.rs (FN_* constants, emitter dispatch)
#
# Discrepancies found during initial audit (documented, not fixed):
#   - f32_to_string: registered in checker.rs but NOT in PRELUDE_FUNCTIONS (resolve.rs)
#   - __intrinsic_string_is_empty: listed in PRELUDE_FUNCTIONS but has no FnSig in checker.rs
#   - Several builtins in PRELUDE_FUNCTIONS lack FnSig in checker.rs:
#       unwrap_or_else, clear, is_ok, is_err, Vec_with_capacity_i32,
#       Vec_with_capacity_String, as_slice, ok_or, ok, err, expect,
#       map_option_String_String, map_result_i32_i32
#     These are resolved dynamically or via special-case handling in the type checker.

[metadata]
version = "0.1.0"

# ─────────────────────────────────────────────
# Prelude types (auto-imported)
# ─────────────────────────────────────────────

[[types]]
