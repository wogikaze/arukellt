[workspace]
members = [
  "crates/lang-core",
  "crates/lang-ir",
  "crates/lang-interp",
  "crates/lang-backend-wasm",
  "crates/lang-cli",
  "crates/lang-playground-core",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
wasm-bindgen = "0.2"
wat = "1.240"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
