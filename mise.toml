[tools]
rust = "1.85"

[tasks.build]
run = "cargo build"
description = "Build all crates"

[tasks."build:release"]
run = "cargo build --release"
description = "Build all crates in release mode"

[tasks.test]
run = "cargo test --workspace"
description = "Run all unit tests"

[tasks."test:unit"]
run = "cargo test --workspace --lib"
description = "Run library unit tests only"

[tasks."test:t1"]
run = "cargo test --test harness -- --nocapture"
description = "Run T1 fixture harness"

[tasks.lint]
run = "cargo clippy --workspace -- -D warnings"
description = "Run clippy lints"

[tasks.fmt]
run = "cargo fmt --all"
description = "Format all code"

[tasks."fmt:check"]
run = "cargo fmt --all --check"
description = "Check formatting"

[tasks.verify]
run = "bash scripts/verify-harness.sh"
description = "Run full verification harness (10 checks)"

[tasks."verify:quick"]
run = "bash scripts/verify-harness.sh --quick"
description = "Run quick verification"

[tasks.check]
run = "cargo check --workspace"
description = "Type-check all crates"

[tasks.bench]
run = "bash scripts/run-benchmarks.sh --full"
description = "Run default local benchmark workflow"

[tasks."bench:quick"]
run = "bash scripts/run-benchmarks.sh --quick"
description = "Run quick benchmark smoke workflow"

[tasks."bench:compare"]
run = "cargo build --release -p arukellt && python3 scripts/benchmark_runner.py --mode compare"
description = "Compare current benchmark results against baseline"

[tasks."bench:update-baseline"]
run = "cargo build --release -p arukellt && python3 scripts/benchmark_runner.py --mode update-baseline"
description = "Update benchmark baselines from current measurements"

[tasks."bench:ci"]
run = "cargo build --release -p arukellt && python3 scripts/benchmark_runner.py --mode ci"
description = "Run benchmark regression gate for CI"
