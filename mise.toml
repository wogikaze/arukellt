[tools]
wasmtime = "latest"

[tasks.build]
run = "python3 scripts/manager.py selfhost fixpoint --build"
description = "Build and verify the selfhost compiler"

[tasks.test]
run = "python3 scripts/manager.py verify"
description = "Run repository verification"

[tasks."test:t1"]
run = "ARUKELLT_TARGET=wasm32-wasi-p1 python3 scripts/manager.py selfhost fixture-parity"
description = "Run T1 selfhost fixture parity"

[tasks."test:t3"]
run = "ARUKELLT_TARGET=wasm32-wasi-p2 python3 scripts/manager.py selfhost fixture-parity"
description = "Run T3 selfhost fixture parity"

[tasks.lint]
run = "python3 scripts/manager.py verify --quick"
description = "Run quick verification"

[tasks.fmt]
run = "npx markdownlint-cli2 '**/*.md' --fix --config .markdownlint.json"
description = "Format documentation"

[tasks."fmt:docs"]
run = "npx markdownlint-cli2 '**/*.md' --fix --config .markdownlint.json"
description = "Format documentation"

[tasks."fmt:check"]
run = "npx markdownlint-cli2 '**/*.md' --config .markdownlint.json"
description = "Check documentation formatting"

[tasks.verify]
run = "python3 scripts/manager.py verify"
description = "Run repository verification"

[tasks."verify:quick"]
run = "python3 scripts/manager.py verify --quick"
description = "Run fast local verification"

[tasks."verify:fixtures"]
run = "python3 scripts/manager.py verify --fixtures"
description = "Run manifest-driven fixture harness"

[tasks."verify:baseline"]
run = "python3 scripts/util/collect-baseline.py"
description = "Collect baseline snapshots"

[tasks."verify:full"]
run = "python3 scripts/manager.py verify --full"
description = "Run full local verification"

[tasks."verify:ci"]
run = "python3 scripts/manager.py verify && python3 scripts/manager.py selfhost fixpoint && python3 scripts/manager.py selfhost fixture-parity && python3 scripts/manager.py selfhost parity --mode --cli && python3 scripts/manager.py selfhost diag-parity"
description = "Run the CI verification groups"

[tasks."verify:pre-commit"]
run = "python3 scripts/manager.py verify --quick && python3 scripts/check/check-docs-consistency.py"
description = "Run recommended pre-commit checks"

[tasks."metrics"]
run = "python3 scripts/util/repo_metrics.py"
description = "Count lines/chars/bytes by extension, area, and content kind"

[tasks."metrics:full"]
run = "python3 scripts/util/repo_metrics.py --mode git --csv reports/repo-metrics.csv --json reports/repo-metrics.json"
description = "Full repo metrics with CSV and JSON output"

[tasks."hooks:install"]
run = "bash scripts/gate/install-git-hooks.sh"
description = "Install repository-managed git hooks"

[tasks."hooks:pre-commit"]
run = "bash scripts/gate/pre-commit-verify.sh"
description = "Run the repository-managed pre-commit verification script"

[tasks."hooks:remove"]
run = "bash scripts/gate/install-git-hooks.sh --remove"
description = "Remove repository-managed git hooks"

[tasks.check]
run = "python3 scripts/manager.py verify --quick"
description = "Run quick verification"

[tasks.bench]
run = "python3 scripts/util/benchmark_runner.py --mode full"
description = "Run default local benchmark workflow"

[tasks."bench:quick"]
run = "python3 scripts/util/benchmark_runner.py --mode quick"
description = "Run quick single-sample benchmark smoke workflow"

[tasks."bench:compare"]
run = "python3 scripts/util/benchmark_runner.py --mode compare"
description = "Run benchmarks and compare current results against stored baseline"

[tasks."bench:update-baseline"]
run = "python3 scripts/util/benchmark_runner.py --mode update-baseline"
description = "Update benchmark baselines from current measurements"

[tasks."bench:ci"]
run = "python3 scripts/util/benchmark_runner.py --mode ci"
description = "Run benchmark regression gate for CI"
