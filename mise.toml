[tools]
rust = "1.85"

[tasks.build]
run = "cargo build"
description = "Build all crates"

[tasks."build:release"]
run = "cargo build --release"
description = "Build all crates in release mode"

[tasks.test]
run = "cargo test --workspace"
description = "Run all unit tests"

[tasks."test:unit"]
run = "cargo test --workspace --lib"
description = "Run library unit tests only"

[tasks."test:t1"]
run = "cargo test --test harness -- --nocapture"
description = "Run T1 fixture harness"

[tasks.lint]
run = "cargo clippy --workspace -- -D warnings"
description = "Run clippy lints"

[tasks.fmt]
run = "cargo fmt --all"
description = "Format all code"

[tasks."fmt:check"]
run = "cargo fmt --all --check"
description = "Check formatting"

[tasks.verify]
run = "bash scripts/verify-harness.sh"
description = "Run full verification harness (10 checks)"

[tasks."verify:quick"]
run = "bash scripts/verify-harness.sh --quick"
description = "Run quick verification"

[tasks.check]
run = "cargo check --workspace"
description = "Type-check all crates"
