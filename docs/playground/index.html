<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arukellt Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #181825;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    header .badge {
      font-size: 0.7rem;
      padding: 2px 6px;
      background: #89b4fa22;
      color: #89b4fa;
      border: 1px solid #89b4fa44;
      border-radius: 4px;
    }

    #playground {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    /* Override playground-app component styles to fit the dark theme */
    .ark-playground-app {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .ark-playground-editor-container {
      flex: 1;
      min-height: 320px;
    }

    /* Editor shell — ark-editor CSS from playground dist is injected at runtime */
    #error-banner {
      background: #f38ba822;
      border: 1px solid #f38ba844;
      color: #f38ba8;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.85rem;
      display: none;
    }

    #error-banner.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>Arukellt Playground</h1>
    <span class="badge">v1</span>
  </header>

  <div id="error-banner" role="alert"></div>
  <div id="playground"></div>

  <script type="module">
    /**
     * Arukellt Playground — browser entrypoint.
     *
     * Loads createPlaygroundApp from the tsc-built dist/ output (generated by
     * `npm run build:app` in playground/). When the Wasm module is available
     * (ark_playground_wasm.js + ark_playground_wasm_bg.wasm under ./wasm/),
     * it is used for real parse results. Otherwise a lightweight stub is used
     * so the editor shell still renders correctly.
     */

    import { createPlaygroundApp } from './dist/playground-app.js';
    import { injectTheme, DEFAULT_THEME_CSS } from './dist/theme.js';

    // Inject the default theme into the page.
    injectTheme(DEFAULT_THEME_CSS);

    const container = document.getElementById('playground');
    const errorBanner = document.getElementById('error-banner');

    /**
     * Minimal parse stub — returns no diagnostics.
     * Replaced at runtime when the Wasm module loads successfully.
     *
     * @param {string} _source
     * @returns {{ ok: boolean, diagnostics: [], module: null }}
     */
    function stubParse(_source) {
      return { ok: true, diagnostics: [], module: null };
    }

    // Try to load the real Wasm-backed playground.
    // The Wasm assets live at ./wasm/ (copied by `build:app`).
    // If they are absent (e.g., GitHub Pages before the first CI Wasm build),
    // fall back to the stub so the editor shell still renders.
    let parseFn = stubParse;

    try {
      const { createPlayground } = await import('./dist/index.js');

      // Resolve the Wasm URL: prefer the content-hashed filename from
      // asset-manifest.json (written by scripts/gen/stamp-playground-assets.sh
      // during build) for proper browser cache busting.  Falls back to the
      // fixed filename when the manifest is absent (e.g., local dev without
      // wasm-pack).
      let wasmUrl = './wasm/ark_playground_wasm_bg.wasm';
      try {
        const resp = await fetch('./wasm/asset-manifest.json');
        if (resp.ok) {
          const manifest = await resp.json();
          if (manifest && manifest.wasmUrl) { wasmUrl = manifest.wasmUrl; }
        }
      } catch { /* manifest absent — use fixed URL */ }

      const pg = await createPlayground(
        './wasm/ark_playground_wasm.js',
        { wasmUrl },
      );
      parseFn = (source) => pg.parse(source);
    } catch {
      // Wasm not yet available — editor runs with stub parse (no diagnostics).
      if (errorBanner) {
        errorBanner.textContent =
          'Wasm module not loaded — diagnostics disabled. ' +
          'Run `npm run build:app` to enable full functionality.';
        errorBanner.classList.add('visible');
      }
    }

    createPlaygroundApp(container, {
      initialValue: [
        'fn main() {',
        '    // Write Arukellt code here.',
        '    let msg = "Hello, Arukellt!";',
        '    print(msg);',
        '}',
        '',
      ].join('\n'),
      parse: parseFn,
    });
  </script>
</body>
</html>
