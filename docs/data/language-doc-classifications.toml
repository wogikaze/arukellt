# Language doc classifications — defined by ADR-018.
# Every file listed under docs/language/ (excluding README.md) MUST have an entry here.
# Classes: normative | explanatory | transitional
# Add a new entry before merging any new docs/language/*.md file.

[[docs]]
file = "spec.md"
class = "normative"
note = "Frozen authoritative language specification; post-freeze changes require an ADR"

[[docs]]
file = "syntax.md"
class = "normative"
note = "Current-first syntax reference; reflects implemented, tested behavior"

[[docs]]
file = "error-handling.md"
class = "normative"
note = "Current-first error handling reference; reflects implemented Result/Option behavior"

[[docs]]
file = "memory-model.md"
class = "normative"
note = "Current-first memory model reference; reflects GC-native T3 implementation"

[[docs]]
file = "type-system.md"
class = "normative"
note = "Current-first type system reference; reflects implemented type checker behavior"

[[docs]]
file = "syntax-v1-preview.md"
class = "transitional"
note = "Describes planned v1 syntax additions; retires when all items land in spec.md"

[[docs]]
file = "guide.md"
class = "explanatory"
note = "Current-first language guide; stable/implemented features only; recommended first reading"

[[docs]]
file = "maturity-matrix.md"
class = "normative"
note = "Generated feature maturity matrix; do not edit manually — regenerated from [[features]] below"

