# Host capability matrix SSOT (#770 Phase 2)
# Axes: declared, registered, compiles, links, runs, user_reachable, grant_required, verified_on

[meta]
source_of_truth = "docs/data/capabilities.toml"
human_view = "docs/capability-surface.md"
deny_policy_doc = "docs/process/policy.md"

[[modules]]
id = "stdio"
module = "std::host::stdio"
path = "std/host/stdio.ark"
declared = true
registered = true
compiles = true
links = true
runs = true
user_reachable = true
grant_required = "no"
verified_on = ["wasm32", "wasm32-gc"]
notes = "Always available"

