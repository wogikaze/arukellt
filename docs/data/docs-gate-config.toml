# Docs CI hard-gate configuration (#765)
# Allowlists and budgets for scripts/check/gate-765-docs-ci-hard-gates.py

[deprecated_vocab]
# Paths (repo-relative) skipped entirely for deprecated-target / T0–T5 scans.
path_globs = [
  "docs/history/**",
  # Accepted ADRs are NOT wholesale-excluded — see [accepted_adr] + gate logic.
  # Non-accepted ADR statuses are skipped by check_deprecated_vocab.
  "docs/rfcs/**",
  "docs/plans/**",
  "docs/research/**",
  "docs/design/**",
  "docs/spec/**",
  "docs/history/benchmarks/benchmark-results.md",
  "docs/process/false-done-prevention.md",
]

# Line substrings that mark a mention as historical / alias / type-param noise.
line_allow_substrings = [
  "legacy",
  "alias",
  "historical",
  "retired",
  "obsolete",
  "invalid",
  "廃止",
  "旧",
  "W0002",
  "公開契約ではない",
  "実装ギャップ",
  "was ",
  "移行",
  "availability",
  "evidence ではない",
  "全件 skipped",
  "t3-run",
  "t3-compile",
  "hard error",
  "Hard error",
  "(T1, T2",
  "fn(T1",
  "Variant(T1",
  "param1: T1",
  "Anonymous product",
]

# Additional files scanned in "strict" mode (must stay clean).
strict_paths = [
  "docs/current-state.md",
  "docs/README.md",
  "docs/quickstart.md",
  "docs/contributing.md",
  "docs/release-criteria.md",
  "docs/release-checklist.md",
  "docs/test-strategy.md",
  "docs/capability-surface.md",
  "docs/process/policy.md",
  "docs/process/decision-guide.md",
  "docs/language/*.md",
  "docs/platform/*.md",
  "docs/state/*.md",
  "docs/stdlib/README.md",
  "docs/stdlib/generation-schema.md",
  "docs/stdlib/stability-policy.md",
  "docs/stdlib/scoreboard.md",
  "docs/adr/ADR-*.md",
]

[accepted_adr]
# Scan Accepted ADRs for deprecated vocab (#770 Phase 3).
# Draft / Proposed / Superseded / Rejected ADRs remain excluded.
require_accepted_scanned = true
accepted_status_markers = [
  "ステータス: **ACCEPTED**",
  "Status: **ACCEPTED**",
  "**Status:** Accepted",
  "status: accepted",
]

[skip_doc_check]
# Ceiling counts — increasing beyond ratchet_max fails the gate.
# Prefer structured form: <!-- skip-doc-check reason="..." owner="..." kind="pseudocode|future|non-runnable" expires="YYYY-MM-DD" -->
require_structured = true
require_expires = true

# Global ceiling: total skip-doc-check count across all files must not exceed this.
# Current total: 251. Ratchet target: decrease over time.
global_max = 251
global_ratchet_max = 251
# Require every file with skip-doc-check to have a budget entry.
require_all_budgeted = true

