[project]
name = "Arukellt"
version = "0.1.0"
tagline = "Wasm-first、LLM-friendly を目指す静的型付け言語。"
updated = "2026-07-15"
verification_command = "python3 scripts/manager.py verify quick"
agent_verification_command = "python3 scripts/manager.py verify lane"
current_state_doc = "docs/current-state.md"

[pipeline]
current = ["Lexer", "Parser", "Resolver", "TypeChecker", "CoreHIR", "MIR", "Wasm"]
refactor_target = [
  "Lex",
  "Parse",
  "Bind",
  "Load",
  "Analyze",
  "Resolve",
  "Check+BuildCoreHIR",
  "LowerToMIR",
  "MIRValidate",
  "MIROptimize",
  "BackendPlan",
  "WasmEmit / LLVMEmit",
  "BackendValidate",
]
session_entry = "ark-driver::Session"
dump_phases = ["parse", "resolve", "corehir", "mir", "optimized-mir", "backend-plan"]

[targets]
cli_default = "wasm32-gc"
canonical = "wasm32-gc"
component_target = "wasm32-gc"
default_emit = "core-wasm"
component_emit = true
wit_emit = true
component_note = "ADR-008 ideal is in-tree; living path may still use wasm-tools / Python wrap helpers. Command components work on pinned bootstrap; library-style pub fn exports need ARUKELLT_SELFHOST_WASM=.build/selfhost/arukellt-s2.wasm (empty WIT on pinned — see current-state). Binary = arukellt; `component build` aliases compile --emit component."

[[target_profiles]]
id = "wasm32"
support_tier = "supported"
implementation_state = "complete"
contract_stability = "stable"
run_supported = true
default_host_profile = "wasi-p1"
role = "Supported: AtCoder / linear-memory competition path"
display = "WebAssembly linear-memory target (WASI P1)"

[[target_profiles]]
id = "wasm32-gc"
support_tier = "primary"
implementation_state = "partial"
contract_stability = "stable"
run_supported = true
default_host_profile = "wasi-p2"
role = "Primary (ADR-013): Wasm GC + WASI P2 default host profile; GC lowering still partial"
display = "WebAssembly GC target (WASI P2, default)"

[[target_profiles]]
id = "native-cpp"
support_tier = "scaffold"
implementation_state = "scaffold"
contract_stability = "experimental"
run_supported = false
role = "Scaffold C99 emit path"
display = "Native C++ backend scaffold"

[[target_profiles]]
id = "native-llvm"
support_tier = "scaffold"
implementation_state = "scaffold"
contract_stability = "experimental"
run_supported = false
role = "Scaffold LLVM IR emit; semantics/ABI per ADR-045 undecided"
display = "Native LLVM backend scaffold"

# User input spellings are canonicalized once at the CLI/config boundary. These
# entries are the only product-contract owner for deprecated aliases and rejected
# legacy target names. Compiler and extension views are generated from this table.
[[target_aliases]]
input = "wasm32-wasi-p1"
canonical_target = "wasm32"
host_profile = "wasi-p1"
policy = "warning"
warning_id = "W0002"
replacement = "--target wasm32 --wasi-version wasi-p1"
compatibility_status = "deprecated"

[[target_aliases]]
input = "wasm32-wasi"
canonical_target = "wasm32"
host_profile = "wasi-p1"
policy = "warning"
warning_id = "W0002"
replacement = "--target wasm32 --wasi-version wasi-p1"
compatibility_status = "deprecated"

[[target_aliases]]
input = "wasm32-wasi-p2"
canonical_target = "wasm32-gc"
host_profile = "wasi-p2"
policy = "warning"
warning_id = "W0002"
replacement = "--target wasm32-gc --wasi-version wasi-p2"
compatibility_status = "deprecated"

[[target_aliases]]
input = "wasm-gc"
canonical_target = "wasm32-gc"
host_profile = "wasi-p2"
policy = "warning"
warning_id = "W0002"
replacement = "--target wasm32-gc --wasi-version wasi-p2"
compatibility_status = "deprecated"

[[target_aliases]]
input = "wasm-gc-wasi-p2"
canonical_target = "wasm32-gc"
host_profile = "wasi-p2"
policy = "warning"
warning_id = "W0002"
replacement = "--target wasm32-gc --wasi-version wasi-p2"
compatibility_status = "deprecated"

[[target_aliases]]
input = "wasm32-wasi-p3"
canonical_target = "wasm32-gc"
host_profile = "wasi-p3"
policy = "warning"
warning_id = "W0002"
replacement = "--target wasm32-gc --wasi-version wasi-p3"
compatibility_status = "deprecated"

[[target_aliases]]
input = "native"
policy = "error"
replacement = "use --target native-cpp or --target native-llvm"
compatibility_status = "rejected-ambiguous"

[[target_aliases]]
input = "wasm32-freestanding"
policy = "error"
replacement = "choose a canonical target; freestanding is not supported"
compatibility_status = "rejected"

[[legacy_gaps]]
id = "wasm32-freestanding"
action = "remove"
note = "ADR-007 retired (hard error as public target); leftover driver/emitter code is deletion backlog, not a public contract"

# Host profiles are NOT targets (ADR-007/013). Keep separate from [[target_profiles]].
[[host_profiles]]
id = "wasi-p1"
# ADR-007: wasm32-gc + --wasi p1 is a compile error today. Do not list wasm32-gc
# in supported_targets until that contract changes.
supported_targets = ["wasm32"]
planned_targets = []
rejected_targets = ["wasm32-gc"]
support_tier = "supported"
# Host ABI adapter exists for wasm32; stdlib capability coverage is incomplete
# (e.g. env::var). Keep partial until capability matrix is complete.
implementation_state = "partial"
contract_stability = "stable"
role = "WASI Preview 1 host profile (AtCoder / linear path on wasm32 only; wasm32-gc+P1 rejected per ADR-007)"

[[host_profiles]]
id = "wasi-p2"
supported_targets = ["wasm32-gc"]
support_tier = "primary"
implementation_state = "partial"
contract_stability = "stable"
role = "Default host profile for primary target wasm32-gc (ADR-013)"

[[host_profiles]]
id = "wasi-p3"
supported_targets = ["wasm32-gc"]
support_tier = "not-started"
implementation_state = "unimplemented"
contract_stability = "experimental"
role = "Future WASI Preview 3 host profile on wasm32-gc; not a separate language target"

[verification]
last_verified_at = "2026-07-15"
# Commit separation — each axis has its own commit to avoid conflating
# documentation edits with implementation verification:
#   implementation_commit — the code commit that was verified
#   documentation_commit  — the last commit that edited this SSOT
#   fixture_snapshot_commit — the commit where the fixture harness was last run
implementation_commit = "982f3102"
documentation_commit = "148c1184"
fixture_snapshot_commit = "982f3102"
# Legacy field kept for backward compat — same as implementation_commit
source_commit = "982f3102"
fixture_passed = 57
fixture_skipped = 442
fixture_failures = 1089
fixture_manifest_count = 2703
# Accounting: harness pass/fail/skip is a recorded *observed* run snapshot.
# Manifest count is the registry size. Units differ — never present as N/M of the same unit.
fixture_harness_observed = 1588
fixture_not_in_last_harness_snapshot = 1115
fixture_accounting_note = "57+1089+442=1588 outcomes from the 2026-07-15 selfhost fixture-parity run at 982f3102; 2703 is tests/fixtures/manifest.txt registry size. The 1115 remainder were not part of that run (not proof they fail)."
checks_passed = 165
checks_total = 166
unit_tests_note = "selfhost verification is tracked by `python3 scripts/manager.py verify`"

# Release blockers are owned by docs/data/release-guarantees.toml (the check
# catalogue with release_blocking = true). This file only holds fixture
# snapshot counts and verification metadata — not blocker command/status/count
# copies. The generated current-state.md pulls blocker rows from the catalogue.
#
# Blocker check IDs (for reference; canonical data is in release-guarantees.toml):
#   check_fixture_harness, check_t3_wasm_validate, check_wat_roundtrip,
#   check_component_interop_wasmtime, check_selfhost_cli_parity,
#   check_selfhost_diag_parity, check_selfhost_fixpoint

[contract_audit]
component_emit_tier = "smoke"
p2_native_tier = "smoke"
host_http_user_reachable = false
readme_status_source = "project-state.toml + generate-docs.py"

[perf]
check_budget_pct = 10
compile_budget_pct = 20
baseline_cases = [
  "docs/examples/hello.ark",
  "docs/examples/vec.ark",
  "docs/examples/closure.ark",
  "docs/sample/parser.ark",
]
heavy_note = "Heavy perf comparisons are intentionally separated from the normal correctness gate"

[component]
status = "Implemented on `wasm32-gc` for supported WIT-compatible exports (ADR-008 in-tree ideal; wrap helpers may still call wasm-tools)"
summary = "Only user `pub fn` with WIT-compatible types are exported"

# Lifecycle status labels used across docs, issues, and target-contract.md.
# Every feature / target surface should use one of these labels.
# Axis separation (do not overload a single `status` field):
# - support_tier: primary | supported | scaffold | not-started  (ADR-007/013)
# - contract_stability: stable | provisional | experimental  (ADR-007 §9; CLI/target contract, NOT ADR-014 API)
# - implementation_state: complete | partial | scaffold | unimplemented
# - legacy_gaps: retired surfaces awaiting deletion (not target_profiles)

[stdlib_api_lifecycle]
# API stability labels (ADR-014). support_tier / implementation_state / legacy_gaps
# use their own fields — do not overload this list.
labels = [
  "stable",
  "provisional",
  "experimental",
  "deprecated",
]

[language_feature_maturity]
labels = ["stable", "provisional", "experimental", "unimplemented"]
