[project]
name = "Arukellt"
version = "0.1.0"
tagline = "Wasm-first、LLM-friendly を目指す静的型付け言語。"
updated = "2026-07-11"
verification_command = "python3 scripts/manager.py verify quick"
current_state_doc = "docs/current-state.md"

[pipeline]
current = ["Lexer", "Parser", "Resolver", "TypeChecker", "CoreHIR", "MIR", "Wasm"]
refactor_target = [
  "Lex",
  "Parse",
  "Bind",
  "Load",
  "Analyze",
  "Resolve",
  "Check+BuildCoreHIR",
  "LowerToMIR",
  "MIRValidate",
  "MIROptimize",
  "BackendPlan",
  "WasmEmit / LLVMEmit",
  "BackendValidate",
]
session_entry = "ark-driver::Session"
dump_phases = ["parse", "resolve", "corehir", "mir", "optimized-mir", "backend-plan"]

[targets]
cli_default = "wasm32-gc"
canonical = "wasm32-gc"
component_target = "wasm32-gc"
default_emit = "core-wasm"
component_emit = true
wit_emit = true
component_note = "ADR-008 ideal is in-tree; living path may still use wasm-tools / Python wrap helpers (see current-state ADR gaps). CLI default = primary (wasm32-gc); impl may still spell alias wasm32-wasi-p2 until parser migrates."

[[target_profiles]]
id = "wasm32"
support_tier = "supported"
implementation_state = "complete"
contract_stability = "stable"
run_supported = true
role = "Supported: AtCoder / linear-memory competition path (was wasm32-wasi-p1)"

[[target_profiles]]
id = "wasm32-gc"
support_tier = "primary"
implementation_state = "partial"
contract_stability = "stable"
run_supported = true
role = "Primary (ADR-013): Wasm GC + WASI P2 default host profile; GC lowering still partial"

[[target_profiles]]
id = "native-cpp"
support_tier = "scaffold"
implementation_state = "scaffold"
contract_stability = "experimental"
run_supported = false
role = "Scaffold C99 emit path"

[[target_profiles]]
id = "native-llvm"
support_tier = "scaffold"
implementation_state = "scaffold"
contract_stability = "experimental"
run_supported = false
role = "Scaffold LLVM IR emit; semantics/ABI per ADR-045 undecided"

[[legacy_gaps]]
id = "wasm32-freestanding"
action = "remove"
note = "ADR-007 retired (hard error as public target); leftover driver/emitter code is deletion backlog, not a public contract"

# Host profiles are NOT targets (ADR-007/013). Keep separate from [[target_profiles]].
[[host_profiles]]
id = "wasi-p1"
supported_targets = ["wasm32", "wasm32-gc"]
support_tier = "supported"
implementation_state = "complete"
contract_stability = "stable"
role = "WASI Preview 1 host profile (AtCoder / linear path on wasm32; also usable on wasm32-gc)"

[[host_profiles]]
id = "wasi-p2"
supported_targets = ["wasm32-gc"]
support_tier = "primary"
implementation_state = "partial"
contract_stability = "stable"
role = "Default host profile for primary target wasm32-gc (ADR-013)"

[[host_profiles]]
id = "wasi-p3"
supported_targets = ["wasm32-gc"]
support_tier = "not-started"
implementation_state = "unimplemented"
contract_stability = "experimental"
role = "Future WASI Preview 3 host profile on wasm32-gc; not a separate language target"

[verification]
fixture_passed = 654
fixture_skipped = 29
fixture_failures = 4
fixture_manifest_count = 1199
checks_passed = 162
checks_total = 168
unit_tests_note = "selfhost verification is tracked by `python3 scripts/manager.py verify`"

[contract_audit]
component_emit_tier = "smoke"
p2_native_tier = "smoke"
host_http_user_reachable = false
readme_status_source = "project-state.toml + generate-docs.py"

[perf]
check_budget_pct = 10
compile_budget_pct = 20
baseline_cases = [
  "docs/examples/hello.ark",
  "docs/examples/vec.ark",
  "docs/examples/closure.ark",
  "docs/sample/parser.ark",
]
heavy_note = "Heavy perf comparisons are intentionally separated from the normal correctness gate"

[[diagnostics]]
code = "W0001"
severity = "warning"
phase = "typecheck"
summary = "same-body heuristic warning for shared mutable aliasing"

[[diagnostics]]
code = "W0002"
severity = "warning"
phase = "target"
summary = "deprecated target alias warning"

[[diagnostics]]
code = "W0004"
severity = "error"
phase = "backend-validate"
summary = "generated Wasm failed backend validation"

[[diagnostics]]
code = "W0005"
severity = "warning"
phase = "component"
summary = "non-exportable function skipped from component exports"

[[diagnostics]]
code = "W0101"
severity = "warning"
phase = "parse"
summary = "deprecated `import <name>` syntax; use `use <name>`"

[[diagnostics]]
code = "E0500"
severity = "error"
phase = "resolve"
summary = "module requires a different target (e.g. `std::host::sockets` on wasm32 emits E0500; use `--target wasm32-gc`)"

[[diagnostics]]
code = "E0501"
severity = "error"
phase = "typecheck"
summary = "symbol not found in module (e.g. `string::nonexistent_fn()` when the function is not exported by the imported module)"

[component]
status = "Implemented on `wasm32-gc` for supported WIT-compatible exports (ADR-008 in-tree ideal; wrap helpers may still call wasm-tools)"
summary = "Only user `pub fn` with WIT-compatible types are exported"

# Lifecycle status labels used across docs, issues, and target-contract.md.
# Every feature / target surface should use one of these labels.
# Axis separation (do not overload a single `status` field):
# - support_tier: primary | supported | scaffold | not-started  (ADR-007/013)
# - contract_stability: stable | provisional | experimental  (ADR-007 §9; CLI/target contract, NOT ADR-014 API)
# - implementation_state: complete | partial | scaffold | unimplemented
# - legacy_gaps: retired surfaces awaiting deletion (not target_profiles)

[lifecycle]
# API stability labels (ADR-014). support_tier / implementation_state / legacy_gaps
# use their own fields — do not overload this list.
labels = [
  "stable",
  "provisional",
  "experimental",
  "unimplemented",
]
