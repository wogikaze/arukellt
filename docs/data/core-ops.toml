# Future core semantic operations registry scaffold — ADR-042 (PROPOSED) D5
# Human-readable overview: docs/compiler/core-ops-registry.md
#
# Proposed responsibility split; not authoritative until ADR-042 is accepted and
# issue #798 completes the migration.
#
# Fallback values are stable symbol paths (or DefKey after name resolution).
# Do not store compile-local FunctionId here.

schema_version = 1
status = "scaffold"

[registry]
description = "Core semantic operations registry"
planned_outputs = [
  "compiler-type-table",
  "compiler-semantic-ops",
  "stdlib-manifest-validation",
  "docs-semantic-table",
]

# Example scaffold entries (not yet authoritative for codegen).
# Public paths live only in std/manifest.toml via semantic_id references.

[[types]]
id = "simd.i32x4"
kind = "simd"
lane_type = "i32"
lanes = 4

[[types]]
id = "simd.f32x4"
kind = "simd"
lane_type = "f32"
lanes = 4

[[types]]
id = "simd.mask4"
kind = "mask"
lanes = 4

[[operations]]
id = "simd.i32x4.add"
effect = "pure"
may_trap = false
const_evaluable = true
inline_policy = "hint"
lowering_policy = "native_or_fallback"
fallback_symbol = "std::simd::internal::i32x4_add_scalar"

[[operations]]
id = "simd.i32x4.sub"
effect = "pure"
may_trap = false
const_evaluable = true
inline_policy = "hint"
lowering_policy = "native_or_fallback"
fallback_symbol = "std::simd::internal::i32x4_sub_scalar"

[[operations]]
id = "simd.f32x4.add"
effect = "pure"
may_trap = false
const_evaluable = true
inline_policy = "hint"
lowering_policy = "native_or_fallback"
fallback_symbol = "std::simd::internal::f32x4_add_scalar"
