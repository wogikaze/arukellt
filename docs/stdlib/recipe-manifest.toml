# Recipe-to-fixture manifest for cookbook.md
#
# Maps each cookbook recipe to its corresponding test fixture files.
# CI verifies these links via `python3 scripts/check-docs-consistency.py`.
#
# Format:
#   [[recipes]]
#   id       = "kebab-case-recipe-id"   # unique identifier
#   section  = "Cookbook section heading"
#   title    = "Recipe sub-heading"
#   fixtures = ["tests/fixtures/…/file.ark", …]
#
# Rules:
# - Every fixture path must be relative to the repository root
# - Every fixture path must exist on disk (CI enforced)
# - Every 📎 Fixture reference in cookbook.md must appear here
# - Recipes without fixtures use `fixtures = []`

[metadata]
version = 1
cookbook_path = "docs/stdlib/cookbook.md"

