name: CI

on:
  push:
    branches: [master, "feature/**"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  correctness:
    name: Correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify harness
        run: bash scripts/verify-harness.sh

  target-behavior:
    name: Target behavior (${{ matrix.target }})
    needs: correctness
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [wasm32-wasi-p1, wasm32-wasi-p2]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release arukellt
        run: cargo build --release -p arukellt

      - name: Run manifest-driven fixture suite (target=${{ matrix.target }})
        run: cargo test -p arukellt --test harness -- --nocapture

  perf-baseline:
    name: Perf baseline snapshot
    needs: correctness
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release arukellt
        run: cargo build --release -p arukellt

      - name: Collect perf and fixture baselines
        run: python3 scripts/collect-baseline.py

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baselines
          path: tests/baselines/*.json

  verify:
    name: Final Gate
    needs: [correctness, target-behavior]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required correctness checks passed"
