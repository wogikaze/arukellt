[package]
name = "basic-project"
version = "0.1.0"
description = "Test fixture: basic project with all standard fields"

[bin]
name = "basic-project"
path = "src/main.ark"

[targets.wasm32-wasi-p2]
opt_level = 1

[scripts]
test = "arukellt run src/main.ark"
env-check = "printf '%s' \"$ARUKELLT_SCRIPT_SENTINEL\" > script-env.out"
arg-check = "printf '%s' \"$1\" > script-arg.out"
fail = "echo scripted failure >&2; exit 42"
